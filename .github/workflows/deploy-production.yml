name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  verify:
    name: Verify Release Candidate
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  deploy:
    name: Deploy To VPS
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: verify
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$VPS_HOST"
          test -n "$VPS_SSH_KEY"
          install -d -m 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/production_deploy_key
          chmod 600 ~/.ssh/production_deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
          DEPLOY_REF: ${{ github.sha }}
          DEPLOY_REPO: git@github.com:${{ github.repository }}.git
        run: |
          set -euo pipefail
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$PRODUCTION_URL"

          ssh -i ~/.ssh/production_deploy_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=12 \
            "$VPS_USER@$VPS_HOST" \
            "DEPLOY_REPO='$DEPLOY_REPO' DEPLOY_REF='$DEPLOY_REF' DEPLOY_HEALTH_URL='$PRODUCTION_URL/api/health' DEPLOY_DASHBOARD_URL='$PRODUCTION_URL/api/dashboard' bash -s" \
            < scripts/deploy-production.sh
