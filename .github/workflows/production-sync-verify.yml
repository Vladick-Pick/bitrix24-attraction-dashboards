name: Production Sync Verify

on:
  workflow_dispatch:
    inputs:
      paperclip_issue:
        description: Paperclip issue approving this production operation, e.g. BIT-73
        required: true
        type: string
      module:
        description: Module to sync and verify
        required: true
        default: attraction
        type: choice
        options:
          - attraction
      deal_ids:
        description: Comma-separated Bitrix deal IDs to verify
        required: true
        type: string
      stage_id:
        description: Expected attraction stage ID, e.g. C10:UC_EA3R76
        required: true
        type: string
      field_id:
        description: Expected Bitrix field id used by the implemented mapping
        required: true
        type: string
      expected_commit:
        description: Optional commit SHA that production must include
        required: false
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: production-sync-verify
  cancel-in-progress: false

jobs:
  production-sync-verify:
    name: Run Production Sync Verify
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate inputs
        env:
          PAPERCLIP_ISSUE: ${{ inputs.paperclip_issue }}
          MODULE: ${{ inputs.module }}
          DEAL_IDS: ${{ inputs.deal_ids }}
          STAGE_ID: ${{ inputs.stage_id }}
          FIELD_ID: ${{ inputs.field_id }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
        run: |
          set -euo pipefail
          [[ "$PAPERCLIP_ISSUE" =~ ^BIT-[0-9]+$ ]]
          [[ "$MODULE" == "attraction" ]]
          [[ "$DEAL_IDS" =~ ^[0-9]+(,[0-9]+){0,49}$ ]]
          [[ "$STAGE_ID" =~ ^C10:[A-Z0-9_]+$ ]]
          [[ "$FIELD_ID" =~ ^UF_CRM_[0-9]+$ ]]
          if [ -n "$EXPECTED_COMMIT" ]; then
            [[ "$EXPECTED_COMMIT" =~ ^[0-9a-f]{7,40}$ ]]
          fi

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$VPS_HOST"
          test -n "$VPS_SSH_KEY"
          install -d -m 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/production_deploy_key
          chmod 600 ~/.ssh/production_deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Run approved production operation
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
          PAPERCLIP_ISSUE: ${{ inputs.paperclip_issue }}
          MODULE: ${{ inputs.module }}
          DEAL_IDS: ${{ inputs.deal_ids }}
          STAGE_ID: ${{ inputs.stage_id }}
          FIELD_ID: ${{ inputs.field_id }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit || github.sha }}
        run: |
          set -euo pipefail
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$PRODUCTION_URL"

          ssh -i ~/.ssh/production_deploy_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=12 \
            "$VPS_USER@$VPS_HOST" \
            "PAPERCLIP_ISSUE='${PAPERCLIP_ISSUE}' MODULE='${MODULE}' DEAL_IDS='${DEAL_IDS}' STAGE_ID='${STAGE_ID}' FIELD_ID='${FIELD_ID}' EXPECTED_COMMIT='${EXPECTED_COMMIT}' PRODUCTION_URL='${PRODUCTION_URL}' bash -s" \
            < scripts/production-sync-verify.sh
