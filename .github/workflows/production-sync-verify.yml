name: Production Sync Verify

on:
  workflow_dispatch:
    inputs:
      paperclip_issue:
        description: Paperclip issue approving this production operation, e.g. BIT-73
        required: true
        type: string
      module:
        description: Module to sync and verify
        required: true
        default: attraction
        type: choice
        options:
          - attraction
          - leadgen
      deal_ids:
        description: Attraction only. Comma-separated Bitrix deal IDs to verify.
        required: false
        default: ""
        type: string
      stage_id:
        description: Attraction only. Expected attraction stage ID, e.g. C10:UC_EA3R76.
        required: false
        default: ""
        type: string
      field_id:
        description: Attraction only. Expected Bitrix field id used by the implemented mapping.
        required: false
        default: ""
        type: string
      category_id:
        description: Leadgen only. Expected Bitrix deal category, currently 28.
        required: false
        default: "28"
        type: string
      range_from:
        description: Leadgen workload range start.
        required: false
        default: "2026-05-11T00:00:00.000Z"
        type: string
      range_to:
        description: Leadgen workload range end.
        required: false
        default: "2026-05-17T23:59:59.999Z"
        type: string
      expected_commit:
        description: Optional commit SHA that production must include
        required: false
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: production-sync-verify
  cancel-in-progress: false

jobs:
  production-sync-verify:
    name: Run Production Sync Verify
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate inputs
        env:
          PAPERCLIP_ISSUE: ${{ inputs.paperclip_issue }}
          MODULE: ${{ inputs.module }}
          DEAL_IDS: ${{ inputs.deal_ids }}
          STAGE_ID: ${{ inputs.stage_id }}
          FIELD_ID: ${{ inputs.field_id }}
          CATEGORY_ID: ${{ inputs.category_id }}
          RANGE_FROM: ${{ inputs.range_from }}
          RANGE_TO: ${{ inputs.range_to }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
        run: |
          set -euo pipefail
          PRODUCTION_SYNC_VERIFY_MODE=validate bash scripts/production-sync-verify.sh

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$VPS_HOST"
          test -n "$VPS_SSH_KEY"
          install -d -m 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/production_deploy_key
          chmod 600 ~/.ssh/production_deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Run approved production operation
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
          PAPERCLIP_ISSUE: ${{ inputs.paperclip_issue }}
          MODULE: ${{ inputs.module }}
          DEAL_IDS: ${{ inputs.deal_ids }}
          STAGE_ID: ${{ inputs.stage_id }}
          FIELD_ID: ${{ inputs.field_id }}
          CATEGORY_ID: ${{ inputs.category_id }}
          RANGE_FROM: ${{ inputs.range_from }}
          RANGE_TO: ${{ inputs.range_to }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit || github.sha }}
        run: |
          set -euo pipefail
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$PRODUCTION_URL"

          ssh -i ~/.ssh/production_deploy_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=12 \
            "$VPS_USER@$VPS_HOST" \
            "PAPERCLIP_ISSUE='${PAPERCLIP_ISSUE}' MODULE='${MODULE}' DEAL_IDS='${DEAL_IDS}' STAGE_ID='${STAGE_ID}' FIELD_ID='${FIELD_ID}' CATEGORY_ID='${CATEGORY_ID}' RANGE_FROM='${RANGE_FROM}' RANGE_TO='${RANGE_TO}' EXPECTED_COMMIT='${EXPECTED_COMMIT}' PRODUCTION_URL='${PRODUCTION_URL}' bash -s" \
            < scripts/production-sync-verify.sh
